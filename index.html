<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์นักศึกษา - สุภัสสรา เจ๊กนาม</title>
    <style>
        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .profile-card {
            background-color: #ffffff;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 40px 30px;
            text-align: center;
            box-sizing: border-box;
        }
        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4a90e2;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 0;
            color: #333;
            font-size: 24px;
        }
        .university {
            color: #777;
            font-size: 15px;
            margin-top: 5px;
            margin-bottom: 25px;
        }
        .info-container {
            background-color: #f9f9f9;
            border-radius: 10px;
            padding: 15px 20px;
            text-align: left;
        }
        .info-item {
            padding: 10px 0;
            border-bottom: 1px dashed #ddd;
            font-size: 15px;
            color: #555;
            display: flex;
            align-items: center;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            font-weight: bold;
            color: #2c3e50;
            width: 130px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- รูปโปรไฟล์อ้างอิงตามชื่อไฟล์ที่กำหนด -->
        <img src="1550825B-99CE-43F6-8732-168974BFB977 (1)_2.jpg" alt="รูปโปรไฟล์ นางสาว สุภัสสรา เจ๊กนาม" class="profile-pic">
        
        <h1>นางสาว สุภัสสรา เจ๊กนาม</h1>
        <div class="university">มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง</div>
        
        <div class="info-container">
            <div class="info-item">
                <span class="info-label">รหัสนักศึกษา:</span>
                <span>694245018</span>
            </div>
            <div class="info-item">
                <span class="info-label">สาขา:</span>
                <span>วิทยาการคอมพิวเตอร์</span>
            </div>
            <div class="info-item">
                <span class="info-label">คณะ:</span>
                <span>วิทยาศาสตร์และเทคโนโลยี</span>
            </div>
            <div class="info-item">
                <span class="info-label">เบอร์โทรศัพท์:</span>
                <span>0924972320</span>
            </div>
            <div class="info-item">
                <span class="info-label">อีเมล:</span>
                <span>cheknampad2550@gmail.com</span>
            </div>
        </div>
    </div>

</body>
</html>
